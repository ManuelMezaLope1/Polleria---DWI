<div class="col-md-6 offset-md-3">
    <h3 class="text-center">Registro de Zonas</h3>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="form-group">
            <label for="nombre">Nombre: </label>
            <input type="text" class="form-control" formControlName="nombre">
        </div>

        <div class="form-group">
            <label for="departamento">Departamento: </label>
            <select class="form-select" formControlName="departamento" id="departamento">
                <option [ngValue]="null">--Seleccione el departamento--</option>
                <option *ngFor="let d of departamentos" [ngValue]="d">{{d}}</option>
            </select>
        </div>

        <div class="form-group">
            <label for="provincia">Provincia: </label>
            <select class="form-select" formControlName="provincia" id="provincia">
                <option [ngValue]="null">--Seleccione la provincia--</option>
                <option *ngFor="let pro of provinciasFiltradas" [ngValue]="pro">{{pro}}</option>
            </select>
        </div>

        <div class="form-group">
            <label for="distrito">Distrito: </label>
            <input type="text" class="form-control" formControlName="distrito">
        </div>

        <button class="btn btn-success">Guardar</button>

    </form>
</div>
