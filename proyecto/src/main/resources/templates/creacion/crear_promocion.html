<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Promoción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Crear Promoción</h2>

    <form th:action="@{/promociones/guardar}" th:object="${promocion}" method="post">

        <input class="form-control mb-2" th:field="*{titulo}" placeholder="Título">

        <textarea class="form-control mb-2" th:field="*{descripcion}" placeholder="Descripción"></textarea>

        <input class="form-control mb-2" th:field="*{descuento}" placeholder="Descuento %">

        <input class="form-control mb-2" th:field="*{imagen}" placeholder="URL imagen">

        <button class="btn btn-success">Guardar</button>

    </form>

</div>

</body>
</html>
