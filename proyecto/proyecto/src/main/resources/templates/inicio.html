<!DOCTYPE html>
<html xlmns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/css/index/cards.css">
    <style>
        img {
            width: 100px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md bg-dark navbar-dark">
        <a class="navbar-brand" href=""><img src="../imagenes/nuevoLogo.png"></a>

        <div class="collapse navbar-collapse d-flex flex-row-reverse" id="collapsibleNavbar">
            <ul class="navbar-nav">
                <li class="nav-item"><a th:href="@{/inicio}" class="nav-link"><i
                            class="bi bi-house-door-fill"></i>Inicio</a></li>
                <li class="nav-item"><a th:href="@{carta}" class="nav-link"><i class="bi bi-fork-knife"></i>Carta</a>
                </li>
                <li class="nav-item"><a class="nav-link"><i class="bi bi-percent"></i>Ofertas</a></li>
                <li class="nav-item"><a th:href="@{/nosotros}" class="nav-link"><i
                            class="bi bi-person-standing"></i>Nosotros</a></li>
                <li class="nav-item"><a class="nav-link"><i class="bi bi-person-circle"></i>Cuenta</a></li>
                <li class="nav-item"><a class="nav-link"><i class="bi bi-cart"></i>Carro</a></li>
                <li class="nav-item"><a th:href="@{/prueba}" class="nav-link">Prueba</a></li>

                <div th:if=${param.exito}>
                    <div class="alert alert-success">
                        <p>Exito</p>
                    </div>
                </div>

                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a th:href="@{/registro}" class="btn btn-primary">Registro</a>
                    </li>

                    <li class="nav-item">
                        <a th:href="@{/login}" class="btn btn-primary">Login</a>
                    </li>
                </ul>
            </ul>
        </div>
    </nav>
    <br>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4 mb-4" th:each="venta: ${ventas}">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title" th:text="${venta.cantidad}">Nombre</h5>
                        <p>Total: S/.<span class="card-subtitle mb-2 text-muted" th:text="${venta.total}"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <br>
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-bolt me-2"></i>Acciones Rápidas</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="acciones-grid">
                            <a th:href="@{carta}" class="text-decoration-none">
                                <div class="accion-card">
                                    <div class="accion-icono"><i class="fas fa-truck-loading fa-2x mb-2 d-block"></i>
                                    </div>
                                    <div class="accion-titulo"><span class="fw-bold"><i
                                                class="bi bi-fork-knife"></i>Carta</span></div>
                                    <div class="accion-descripcion"><small class="d-block mt-1">Revise todo lo que
                                            ofrecemos</small></div>
                                </div>
                            </a>

                            <a href="gestionproductos.html">
                                <div class="accion-card">
                                    <div class="accion-icono"><i class="fas fa-plus-circle fa-2x mb-2 d-block"></i>
                                    </div>
                                    <div class="accion-titulo"><span class="fw-bold">Nuevo producto</span></div>
                                    <div class="accion-descripcion"><small class="d-block mt-1">Agregar productos al
                                            sistema</small></div>
                                </div>
                            </a>

                            <a href="almacenproveedores.html">
                                <div class="accion-card">
                                    <div class="accion-icono"><i class="fas fa-truck fa-2x mb-2 d-block"></i></div>
                                    <div class="accion-titulo"><span class="fw-bold">Ver Proveedores</span></div>
                                    <div class="accion-descripcion"><small class="d-block mt-1">Gestionar
                                            proveedores</small></div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
