<!DOCTYPE html>
<html xlmns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Carta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        img {
            width: 100px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-md bg-dark navbar-dark">
        <a class="navbar-brand" href=""><img src="../imagenes/nuevoLogo.png"></a>

        <div class="collapse navbar-collapse d-flex flex-row-reverse" id="collapsibleNavbar">
            <ul class="navbar-nav">
                <li class="nav-item"><a th:href="@{/inicio}" class="nav-link"><i class="bi bi-house-door-fill"></i>Inicio</a></li>
                <li class="nav-item"><a th:href="@{carta}" class="nav-link"><i class="bi bi-fork-knife"></i>Carta</a>
                </li>
                <li class="nav-item"><a class="nav-link"><i class="bi bi-percent"></i>Ofertas</a></li>
                <li class="nav-item"><a th:href="@{/nosotros}" class="nav-link"><i class="bi bi-person-standing"></i>Nosotros</a></li>
                <li class="nav-item"><a class="nav-link"><i class="bi bi-person-circle"></i>Cuenta</a></li>
                <li class="nav-item"><a class="nav-link"><i class="bi bi-cart"></i>Carro</a></li>
                <li class="nav-item"><a th:href="@{/prueba}" class="nav-link">Prueba</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <h1>Categorías</h1>
        </div>
        <br>
        <div class="container rounded">
            <div class="row" th:each="categoria : ${categorias}">
                <div class="col-12 mb-4">
                    <div class="card shadow">
                        <div class="card-header bg-danger text-white">
                            <h4 th:text="${categoria.nombre}"></h4>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <!-- Recorremos los platos de cada categoría -->
                                <div class="col-md-4 mb-3" th:each="plato : ${categoria.plato}">
                                    <div class="card h-100 rounded-4 border-transparent">
                                        <img src="../imagenes/nuevoLogo.png" class="card-img-top" alt="...">
                                        <div class="card-body">
                                            <p th:text="${plato.nombre}" class="text-center fw-bold fs-3"></p>
                                            <p th:text="${plato.descripcion}" class="text-muted"></p>
                                            <p class="text-danger fw-bolder fs-5">S/.<span th:text="${plato.precio}"></span></p>
                                            <div class="d-flex justify-content-center">
                                                <button type="button" class="btn btn-warning rounded-5">Comprar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <!-- Mensaje si no hay platos -->
                                <div th:if="${#lists.isEmpty(categoria.plato)}">
                                    <p>No hay platos en esta categoría.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <!--<div class="row">
                <div class="col-md-4 mb-4" th:each="categoria: ${categorias}">
                    <div class="card shadow h-100">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${categoria.nombre}">Nombre</h5>
                            <a type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop"
                            th:href="@{/platos/por_categoria/{id}(id=${categoria.id})}">Ver más</a>
                        </div>
                    </div>
                </div>
            </div>-->
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
